    .gold-frame {

    }

    .streak-display {

    .results-screen {
      position: fixed;

      background: rgba(0,0,0,0.92);

    }

    #status {
  font-size: 1.5rem !important;

  margin: 12px auto;

<body>

<div class="table">
  <h1>Spite and Malice v2</h1>
  
  <!-- === SECTION B: PASTE YOUR FULL ORIGINAL TABLE CONTENT HERE === -->
  <!-- From <div class="scoreboard"> all the way to the end of the player-row div -->
  <!-- IMPORTANT: Remove the duplicate <div class="section"> and second <div id="centers"> you had before -->
</div>

<div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
  <button id="new-game">New Game (Single Player)</button>
  <button id="multi-create-btn">Create Room</button>
  <button id="multi-join-btn">Join Room</button>
  <button id="abandon-btn" style="background:#c00; color:white; display:none;">Abandon Game</button>
  <button id="help-btn" style="background:#555; color:white;">Help ❔</button>
</div>

<!-- === SECTION C: PASTE YOUR MODALS AND DISPLAYS HERE === -->
<!-- Streak display, results-screen, help-modal, multi-modal (exactly as in your original dev.html) -->

<script>
// ====================== NEW CARD HELPERS ======================
function cardToString(c) { return c.rank + c.suit; }

function stringToCard(str) {
  if (!str) return null;
  const suit = str.slice(-1);
  let rank = str.slice(0, -1);
  if (rank === '') rank = str[0];
  const color = (suit === '♥' || suit === '♦') ? 'red' : 'black';
  return { rank: rank, suit: suit, color: color };
}

// ====================== YOUR ORIGINAL GAME CONSTANTS & VARIABLES ======================
// === SECTION D-1: PASTE ALL YOUR ORIGINAL SCRIPT CODE FROM HERE ===
// (Everything from "var RANKS = ..." down to the end of your original script, 
//  except the old createRoom/joinRoom/loadMultiplayerState/tryPlayToCenter/callBackend functions)
// Keep all your scoring, streak, createDeck, shuffle, canPlayOn, aiTurn, updateUI, etc.

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzqV0QOGuSQM-uadVJr73K5-I5tm7FDaituyoqEbTPMM0ISzIHtxhEjnE0CT1rJY6B3/exec';

// ====================== UPDATED MULTIPLAYER FUNCTIONS (replace the old ones) ======================

// Paste the following 6 functions exactly (they replace the old versions)

async function callBackend(action, extraParams = {}) {
  const params = new URLSearchParams({ action, ...extraParams });
  try {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    });
    if (!response.ok) throw new Error('HTTP error');
    const data = await response.json();
    return data;
  } catch (err) {
    console.error(err);
    return { success: false, error: 'Connection error. Please try again.' };
  }
}

async function createRoom() {
  const modalTitle = document.getElementById('modal-title');
  const content = document.getElementById('lobby-content');
  modalTitle.textContent = 'Creating Room...';
  content.innerHTML = `<div style="text-align:center;padding:40px 20px;"><p style="font-size:1.3rem;">Please wait...</p><div style="width:50px;height:50px;border:6px solid #f0c14e;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div></div>`;

  const result = await callBackend('create');
  if (result.success) {
    roomCode = result.roomCode;
    myRole = 'p1';
    isMultiplayer = true;
    lastSeenVersion = 0;
    loadMultiplayerState(result.state);   // uses new string→object conversion
    saveCurrentRoom();

    const fullLink = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
    modalTitle.textContent = '🎉 Room Created!';
    content.innerHTML = `
      <p style="margin:10px 0 5px;font-size:1.1rem;">Share this link with your friend:</p>
      <div style="background:#05261f;padding:15px;border-radius:12px;font-size:1.4rem;font-weight:bold;margin:15px 0;border:3px solid #f0c14e;" id="room-link-display">${fullLink}</div>
      <button onclick="copyRoomLink()" style="background:#f0c14e;color:#222;padding:12px 24px;border:none;border-radius:10px;font-size:1.2rem;font-weight:bold;margin:10px 0;">📋 Copy Link</button>
      <p style="font-size:0.95rem;margin-top:15px;opacity:0.9;">Your friend just needs to tap the link (works even if they don't have the app installed yet).</p>
      <button onclick="startMultiplayerAfterCreate()" style="margin-top:20px;background:#00ff88;color:#222;padding:12px 30px;border:none;border-radius:10px;font-size:1.1rem;font-weight:bold;">I'm Ready – Start Playing</button>
    `;
    startPolling();
    setStatus(`Room ${roomCode} created – waiting for opponent`);
  } else {
    content.innerHTML = `<p style="color:#ff6666;">${result.error || 'Failed to create room'}</p>`;
    modalTitle.textContent = 'Error';
  }
}

function copyRoomLink() {
  const link = document.getElementById('room-link-display').textContent.trim();
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.querySelector('#lobby-content button');
    if (btn) {
      const original = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = original, 2000);
    }
  });
}

function startMultiplayerAfterCreate() {
  document.getElementById('multi-modal').style.display = 'none';
  updateUI();
  setStatus(`Room ${roomCode} – waiting for opponent to join...`);
}

async function joinRoom(code) {
  const result = await callBackend('join', { roomCode: code });
  if (result.success) {
    roomCode = code;
    myRole = 'p2';
    isMultiplayer = true;
    lastSeenVersion = 0;
    loadMultiplayerState(result.state);
    saveCurrentRoom();
    document.getElementById('multi-modal').style.display = 'none';
    setStatus(`Joined room ${roomCode}`);
    startPolling();
  } else {
    alert(result.error || 'Failed to join room');
  }
}

// Updated loadMultiplayerState (handles string cards)
function loadMultiplayerState(fullState) {
  if (myRole === 'p1') {
    playerHand = fullState.p1Hand || [];
    playerPayoff = fullState.p1Payoff || [];
    playerSides = fullState.p1Sides || [[],[],[],[]];
    aiPayoff = fullState.p2Payoff || [];
    aiSides = fullState.p2Sides || [[],[],[],[]];
  } else {
    playerHand = fullState.p2Hand || [];
    playerPayoff = fullState.p2Payoff || [];
    playerSides = fullState.p2Sides || [[],[],[],[]];
    aiPayoff = fullState.p1Payoff || [];
    aiSides = fullState.p1Sides || [[],[],[],[]];
  }
  centers = fullState.centers || [[],[],[],[]];
  stock = fullState.stock || [];
  currentPlayer = (myRole === fullState.currentPlayer) ? "player" : "ai";
  updateUI();
}

// Updated tryPlayToCenter (no optimistic refill + endHand call)
async function tryPlayToCenter(i) {
  if (currentPlayer !== "player" || !selected) return;

  var parts = selected.split('-');
  var type = parts[0], idx = parseInt(parts[1]);
  var card = type === "hand" ? playerHand[idx] : 
             type === "payoff" ? topCard(playerPayoff) : topCard(playerSides[idx]);

  if (!card || !canPlayOn(card, topCard(centers[i]))) {
    setStatus("Illegal move", "#ff6666");
    return;
  }

  var intendedRank = getIntendedRank(card, topCard(centers[i]));
  var cardCopy = { rank: intendedRank, suit: card.suit, color: card.color };

  // Animation (same as before)
  var sourceEl = null;
  if (type === "hand") sourceEl = document.querySelectorAll("#player-hand .card")[idx];
  else if (type === "payoff") sourceEl = document.getElementById("player-payoff-pile").querySelector(".card");
  else sourceEl = document.querySelectorAll("#player-sides .pile")[idx].querySelector(".card");

  var targetPileEl = document.querySelectorAll("#centers .pile")[i];
  if (sourceEl && targetPileEl) animateCardPlay(sourceEl, cardCopy, targetPileEl);

  // Remove from source
  if (type === "hand") playerHand.splice(idx, 1);
  else if (type === "payoff") playerPayoff.pop();
  else playerSides[idx].pop();

  // Add to center
  centers[i].push(cardCopy);

  if (intendedRank === 'Q' || centers[i].length >= 13) {
    stock = stock.concat(centers[i]);
    shuffle(stock);
    centers[i] = [];
  }

  currentStreak++;
  currentStreakFromPayoff = (type === "payoff");
  const points = getStreakPoints(currentStreak, currentStreakFromPayoff);
  handStreakBonus += points;
  showStreak();

  hasPlayedThisTurn = true;
  selected = null;

  updateUI();
  setStatus(`Played ${cardDisplay(cardCopy)} (+${points})`);

  // Auto-refill hand if empty - MULTIPLAYER: SERVER ONLY
  if (playerHand.length === 0) {
    if (!isMultiplayer) {
      while (playerHand.length < 5 && stock.length > 0) {
        playerHand.push(stock.shift());
      }
    }
  }

  if (playerPayoff.length === 0) {
    if (isMultiplayer) {
      setStatus("Saving final move & ending hand...");
      await callBackend('endHand', {
        roomCode: roomCode,
        playerRole: myRole,
        centers: JSON.stringify(centers.map(c => c.map(cardToString))),
        mySides: JSON.stringify(playerSides.map(p => p.map(cardToString))),
        myHand: JSON.stringify(playerHand.map(cardToString)),
        myPayoff: JSON.stringify(playerPayoff.map(cardToString)),
        stock: JSON.stringify(stock.map(cardToString))
      });
    }
    endHand("player");
    return;
  }
}

// ====================== ABANDON BUTTON & DEEP LINK (add at the very end of script) ======================
document.getElementById('abandon-btn').onclick = async () => {
  if (!isMultiplayer || !roomCode) return;
  if (!confirm('Abandon this game? Room will be deleted.')) return;
  await callBackend('abandon', { roomCode: roomCode });
  clearCurrentRoom();
  stopPolling();
  isMultiplayer = false;
  roomCode = null;
  myRole = null;
  location.reload();
};

function handleDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('room');
  if (code) {
    roomCode = code.toUpperCase();
    isMultiplayer = true;
    myRole = 'p2';
    joinRoom(roomCode);
  }
}

// ====================== WINDOW LOAD (replace your old load listener) ======================
window.addEventListener('load', () => {
  initHelpModal();
  initMultiplayerModal();
  document.getElementById("new-game").onclick = startGame;
  handleDeepLink();           // NEW deep link support
  startGame();
});
</script>
</body>
